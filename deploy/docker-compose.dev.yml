services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: messenger_secret
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8 --auth-host=md5"
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "lc_messages=en_US.UTF-8"
      - "-c"
      - "password_encryption=md5"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U messenger" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
